steps:
  # 1. Install dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['install']

  # 2. Build aplikasi (ngubah TSX jadi JS)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  # 3. Deploy ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'agroscan', # Ganti ini sesuai nama service Cloud Run kamu
        '--source',
        '.',
        '--region',
        'asia-southeast2', # Sesuaikan region (misal Jakarta)
        '--allow-unauthenticated'
      ]
